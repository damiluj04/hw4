<html>
    <head>
        <meta charset="UTF-8">
        <title>Damian's Homework 4</title>
		<link rel="stylesheet" href="style.css">
    </head>

    <body>
		<header>
			<table width="100%">
				<tr>
					<td valign="top" align="left" width="20%">
						<div class="image">
							<img align="center" src="medical.png" alt ="Auroraville Clinic" width="70px" id="logo"/>
						</div>
					</td>
	
					<td>
						<h2>Auroraville Clinic</h2>
					</td>
	
					<td valign="bottom" align="right" width="20%">
	                	<p>Today's Date: <span id="today"></span></p>
	            	</td>
				</tr>
			</table>
		</header>
	<hr>

	<center>		
		<span id="welcome"></span>
		<span id="welcome2"></span>
	</center>

	<div class = "iframe-container">
		<iframe 
			class ="iframe" 
			src="https://www.w3schools.com/html/html_iframe.asp" 
			frameborder="0">
		</iframe>
	</div>

	<form id="signup" action="thankyou.html">
		<center>
			<div class="format">
				<table>
					<tr>
						<th colspan="3">Create New Patient Account</th> 
					</tr>

					<tr>
						<td class="td1">
							<label for="fname">First name:</label>
						</td>
						<td>
							<input
							type="text"
							name="fname"
							id="fname"
							minlength="1"
							maxlength="30"
							required
							title="Letters, apostrophes, and dashes only"
							pattern="[a-zA-Z']{1,30}"
							onblur="validateFname()"
							placeholder="First Name"
							/>
						</br>
						<span class="error" id="fname_error"></span>	
						</td>
		
						<td class="td1">
							<label for="mini">Middle initial:</label>
						</td>
						<td>
							<input
							type="text"
							name="mini"
							id="mini"
							maxlength="1"
							size="1"
							title="Letters only"
							pattern="[a-zA-Z']{0,1}"
							onblur="validateMini()"
							placeholder="Middle Initial"
							/>
						
						</br>
						<span class="error" id="mini_error"></span>
						</td>

						<td class="td1">
							<label for="lname">Last name:</label>
						</td>
						<td>
							<input
							type="text"
							name="lname"
							id="lname"
							minlength="1"
							maxlength="30"
							required
							title="Letters, apostrophes, and dashes only"
							pattern="[a-zA-Z']{1,30}"
							onblur="validateLname()"
							placeholder="Last Name"
							/>
						</br>
						<span class="error" id="lname_error"></span>
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="psex">Patient's Sex</label>
						</td>
						<td>
							<input
							type="radio"
							id="s1"
							name="psex"
							value="Male" 
							/> 
							<label for="s1">Male</label>
							
							<input
							type="radio"
							id="s2"
							name="psex"
							value="Female" 
							/> 
							<label for="s2">Female</label>
							
							<input
							type="radio"
							id="s3"
							name="psex"
							value="Other" 
							/> 
							<label for="s3">Other</label>
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="dob">Date of Birth:</label>
						</td>
						<td>
							<input
							type="date"
							name="dob"
							id="dob"
							onblur="validateDob()"
							required
							/>

						</br>
						<span class="error" id="dob_error"></span>
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="ssn">SSN:</label>
						</td>
						<td>
							<input
							type="password"
							minlength="9"
							maxlength="11"
							name="ssn"
							id="ssn"
							required
							title="Numbers only"
							placeholder="123-45-6789"
							onblur="validateSSN()"
							/>
						
						</br>
						<span class="error" id="ssn_error"></span>
						</td>
					</tr>	
						
					<tr>
						<th colspan="4"><hr></th>
					</tr>

					<tr>
						<th colspan="4">Patient's Contact Information</th>
					</tr>

					<tr>
						<td class="td1">
							<label for="address1">Address Line 1:</label>
						</td>
						<td>
							<input
							type="text"
							name="address1"
							id="address1"
							minlength="2"
							maxlength="30"
							required
							title="Enter address line"
							placeholder="4200 Martin Luther King Blvd"
							onblur="validateAddress1()"
							/>

						</br>
						<span class="error" id="address1_error"></span>
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="address2">Address Line 2:</label>
						</td>
						<td>
							<input
							type="text"
							name="address2"
							id="address2"
							minlength="2"
							maxlength="30"
							title="Enter address line"
							placeholder="MH 150"
							/>
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="city">City:</label>
						</td>
						<td>
							<input
							type="text"
							name="city"
							id="city"
							minlength="2"
							maxlength="30"
							required
							title="Enter city"
							placeholder="Houston"
							onblur="validateCity()"
							/>
						</br>
						<span class="error" id="city_error"></span>
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="state">State:</label>
						</td>
						<td>
							<select name="state" id="state">
								<option selected disabled>Please Select One</option>
								<option value="AL">Alabama</option>
								<option value="AK">Alaska</option>
								<option value="AZ">Arizona</option>
								<option value="AR">Arkansas</option>
								<option value="CA">California</option>
								<option value="CO">Colorado</option>
								<option value="CT">Connecticut</option>
								<option value="DE">Delaware</option>
								<option value="DC">District Of Columbia</option>
								<option value="FL">Florida</option>
								<option value="GA">Georgia</option>
								<option value="HI">Hawaii</option>
								<option value="ID">Idaho</option>
								<option value="IL">Illinois</option>
								<option value="IN">Indiana</option>
								<option value="IA">Iowa</option>
								<option value="KS">Kansas</option>
								<option value="KY">Kentucky</option>
								<option value="LA">Louisiana</option>
								<option value="ME">Maine</option>
								<option value="MD">Maryland</option>
								<option value="MA">Massachusetts</option>
								<option value="MI">Michigan</option>
								<option value="MN">Minnesota</option>
								<option value="MS">Mississippi</option>
								<option value="MO">Missouri</option>
								<option value="MT">Montana</option>
								<option value="NE">Nebraska</option>
								<option value="NV">Nevada</option>
								<option value="NH">New Hampshire</option>
								<option value="NJ">New Jersey</option>
								<option value="NM">New Mexico</option>
								<option value="NY">New York</option>
								<option value="NC">North Carolina</option>
								<option value="ND">North Dakota</option>
								<option value="OH">Ohio</option>
								<option value="OK">Oklahoma</option>
								<option value="OR">Oregon</option>
								<option value="PA">Pennsylvania</option>
								<option value="RI">Rhode Island</option>
								<option value="SC">South Carolina</option>
								<option value="SD">South Dakota</option>
								<option value="TN">Tennessee</option>
								<option value="TX">Texas</option>
								<option value="UT">Utah</option>
								<option value="VT">Vermont</option>
								<option value="VA">Virginia</option>
								<option value="WA">Washington</option>
								<option value="WV">West Virginia</option>
								<option value="WI">Wisconsin</option>
								<option value="WY">Wyoming</option>
							</select>
								
							<label for="zcode">Zip Code:</label>
							<input
							type="text"
							name="zcode"
							id="zcode"
							pattern="[0-9]{5}"
							minlength="5"
							maxlength="10"
							required
							title="Numbers only"
							placeholder="77204"
							onblur="validateZcode()"
							/>

						</br>
						<span class="error" id="zcode_error"></span>
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="email">Email Address:</label>
						</td>
						<td>
							<input
							type="text"
							name="email"
							id="email"
							required
							title="Enter email address"
							placeholder="user@example.com"
							pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,20}$"
							onblur="validateEmail()"
							/>
						
						</br>
						<span class="error" id="email_error"></span>
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="phone">Phone Number:</label>
						</td>
						<td>
							<input
							type="text"
							name="phone"
							id="phone"    
							pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
							maxlength="14"
							required
							title="Enter phone number"
							placeholder="(123) 456-7890"
							onblur="validatePhone()"
							/>

						</br>
						<span class="error" id="phone_error"></span>	
						</td>
					</tr>

					<tr>
						<th colspan="4"><hr></th>
					</tr>
					
					<tr>
						<th colspan="4">Patient History</th>
					</tr>

					<tr>
						<td class="td1">
							<label for="history">Have you ever had/are currently <br> experiencing the following conditions?</label>
						</td>
						<td>
							<input 
							type="checkbox" 
							id="option1" 
							value="Fever" 
							/>
							<label 
							for="option1">Fever
							</label><br>

							<input 
							type="checkbox" 
							id="option2" 
							value="Rashing or itching" 
							/>
							<label 
							for="option2">Rashing or itching
							</label><br>

							<input 
							type="checkbox" 
							id="option3" 
							value="Persistent Cough" 
							/>
							<label 
							for="option3">Persistent Cough
							</label><br>

							<input 
							type="checkbox" 
							id="option5" 
							value="Hoarseness" 
							/>
							<label 
							for="option5">Hoarseness
							</label><br>

							<input 
							type="checkbox" 
							id="option6" 
							value="Other" 
							/>
							<label 
							for="option6">Other
							</label><br>
						</td>
					</tr>

					<tr>
						<td class="td1" align="right">
							<label for="notes">Please describe your symptoms:</label>
						</td>
						<td>
							<textarea
							name="notes"
							id="notes"
							rows="3"
							cols="50"
							maxlength="500"
							title="Please enter a brief description of your symptoms"
							placeholder="Enter symptoms here..."
							></textarea>
							<span id="description_text"></span>
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="psex">Do you smoke or consume alochol?</label>
						</td>
						<td>
							<input
							type="radio"
							id="smoke-yes"
							name="smoke"
							value="yes"
							/> 
							<label for="smoke-yes">Yes</label>
							
							<input
							type="radio"
							id="smoke-no"
							name="smoke"
							value="no" 
							/> 
							<label for="smoke-no">No</label>
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="psex">Have you experienced any recent sudden weight loss?</label>
						</td>
						<td>
							<input
							type="radio"
							id="weight-yes"
							name="weight"
							value="yes"
							/> 
							<label for="weight-yes">Yes</label>
							
							<input
							type="radio"
							id="weight-no"
							name="weight"
							value="no" 
							/> 
							<label for="weight-no">No</label>
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="psex">Do you have insurance?</label>
						</td>
						<td>
							<input
							type="radio"
							id="insurance-yes"
							name="insurance"
							value="yes"
							/> 
							<label for="insurance-yes">Yes</label>
							
							<input
							type="radio"
							id="insurance-no"
							name="insurance"
							value="no" 
							/> 
							<label for="insurance-no">No</label>
						</td>
					</tr>
					
					<tr>
						<td class="td1">
							<label for="range">How are you feeling today?<br/>(Rate from 1-10)</label>
						</td>
						<td>
							<input
							type="range"
							class="slider"
							id="range"
							min="1"
							max="10"
							value="1"
							/>
							<label><span id="range-slider"></span></label>
						</td>
					</tr>
					
					<tr>
						<th colspan="4"><hr></th>
					</tr>
					
					<tr>
						<th colspan="4">Finish Patient Account:</th>
					</tr>

					<tr>
						<td class="td1">
							<label for="uname">Username:</label>
						</td>
						<td>
							<input
							type="text"
							name="uname"
							id="uname"
							pattern="[A-Za-z]+[A-Za-z0-9]{8,}"
							minlength="5"
							maxlength="30"
							required
							title="Username must contain at least 5 characters and cannot start with a number."
							placeholder="odlujan"
							onblur="validateUname()"
							/>

						</br>
						<span class="error" id="uname_error"></span>	
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="password">Password:</label>
						</td>
						<td>
							<input
							type="password"
							name="password"
							id="password"
							pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
							minlength="8"
							maxlength="30"
							required
							title="Passwords must be at least 8 characters and no more than 30 characters long and contain at least 1 upper case latter, 1 number and 1 "special" character."
							placeholder="Required"
							onblur="validatePassword()"
							oninput="validatePassword()"
							onfocus="validatePassword()"
							/>

						</br>
						<span class="error" id="pword_error"></span>	
						</td>
					</tr>

					<tr>
						<td class="td1">
							<label for="con_pword">Confirm Password:</label>
						</td>
						<td>
							<input
							type="password"
							name="con_password"
							id="con_password"
							pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
							minlength="8"
							maxlength="30"
							required
							title="Confirm password"
							placeholder="Required"
							onblur="validateConPassword()"
							oninput="validateConPassword()"
							onfocus="validateConPassword()"
							/>

						</br>
						<span class="error" id="password2_error"></span>
						</td>
					</tr>

					<tr>
						<td class="td1" colspan="4">
							<div style="text-align:center;">
								<input 
								type="submit" 
								name="submit" 
								id="submit"
								style="font-family: tahoma, sans-serif;"
								disabled
								/>
								
								&nbsp;&nbsp;&nbsp;
								
								<input 
								type="reset" 
								name="reset"
								id="reset" 
								style="font-family: tahoma, sans-serif;"
								/>

								&nbsp;&nbsp;&nbsp;

								<input 
								type="button" 
								name="review" 
								id="review"
								value="Review"
								style="font-family: tahoma, sans-serif;"
								onclick="reviewInput()"
								/>

								&nbsp;&nbsp;&nbsp;

								<input 
								type="button" 
								name="validate" 
								id="validate"
								value="Validate"
								style="font-family: tahoma, sans-serif;"
								onclick="validateEverything()"
								/>
							</div>
						</td>
					</tr>

					<tr>
						<td class = "td1">
							<label for="remember-me">Remember Me:</label>
						</td>
						<td>
							<input
							type="checkbox"
							name="remember-me"
							id="remember-me"
							checked
							/>
						</td>
					</tr>
				</table>
			</div>
		<div class="password_message">
			<span id="msg1"></span><br/>
			<span id="msg2"></span><br/>
			<span id="msg3"></span><br/>
			<span id="msg4"></span><br/>
			<span id="msg5"></span><br/>
			<span id="msg6"></span><br/>
			<span id="msg7"></span><br/>
			<span id="password2_error"></span><br/>
		</div>
			<center>
				<p id="showInput"></p>
			</center>
		</div>	
		</center>
	</form>

	<iframe 
		src="footer.html" 
		width = "100%"
		height = "100px"
		title = "footer">
	</iframe>

	<script src="hw4.js"></script>

	<div id="alert-box">
		<div id="alert-content">
			<h4>Fill out everything...</h4>
			<button id="close-alert">Close</button>
		</div>
	</div>
		</body>
</html>
